<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TutorFlow — загрузка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <main class="auth-root auth-root--splash">
            <div class="auth-hero">
                <div class="auth-icon auth-icon--brand">T</div>
                <div class="auth-app-name">TutorFlow</div>
                <div class="auth-subtitle">Загружаем ваше расписание...</div>

                    <circle cx="16" cy="16" r="13"/>
                </svg>
            </div>
        </main>
    </div>
    <script src="app.js"></script>

</html>
