<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Страница не найдена — TutorFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <main class="auth-root auth-root--nf">
            <div class="auth-hero">
                <div class="auth-404" aria-hidden="true">404</div>
                <div class="auth-icon auth-icon--neutral" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="8" y1="8" x2="14" y2="14"/>
                        <line x1="14" y1="8" x2="8" y2="14"/>
                    </svg>
                </div>
                <h1 class="auth-title">Страница не найдена</h1>
                <p class="auth-subtitle">Возможно, эта страница была удалена или ссылка неверна.</p>
            </div>

            <div class="auth-actions">
                <a href="../calendar/index.html" class="auth-primary-btn">
                    На главную
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </a>
                <a href="#" class="auth-secondary-btn" data-action="mock" data-mock-msg="Открываем поддержку @tutorflow_support">Написать в поддержку</a>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
