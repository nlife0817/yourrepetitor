<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заявки на запись — Репетитор</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="bookings-pending.css">
</head>
<body>
    <div class="app">

        <!-- Top nav -->
        <div class="top-nav">
            <a class="top-nav-back" href="index.html" aria-label="Назад">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <span class="top-nav-title">Заявки на запись</span>
        </div>

        <!-- Content -->
        <div class="bkp-content no-scrollbar">

            <!-- Header sub -->
            <div class="bkp-header-sub" id="bkpHeaderSub">
                <span class="bkp-header-label">Ожидают подтверждения</span>
                <span class="bkp-count-badge" id="bkpCountBadge">0</span>
            </div>

            <!-- Sort chips -->
            <div class="bkp-sort-row no-scrollbar" id="bkpSortRow">
                <button class="bkp-sort-chip active" data-sort="new">Сначала новые</button>
                <button class="bkp-sort-chip" data-sort="old">Сначала старые</button>
                <button class="bkp-sort-chip" data-sort="lesson">По дате урока</button>
            </div>

            <!-- Cards list -->
            <div class="bkp-list" id="bkpList"></div>

            <!-- Empty state -->
            <div class="bkp-empty" id="bkpEmpty" style="display:none">
                <div class="bkp-empty-icon">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <p class="bkp-empty-text">Все заявки обработаны</p>
                <p class="bkp-empty-sub">Новые заявки появятся здесь</p>
            </div>
        </div>

        <!-- Bottom bar (no FAB) -->
        <div class="bottom-bar">
            <nav class="bottom-nav">
                <a class="nav-item active" aria-current="page" href="index.html">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span>Календарь</span>
                </a>
                <a class="nav-item" href="../students/index.html">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Ученики</span>
                </a>
                <a class="nav-item" href="../analytics/index.html">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    <span>Аналитика</span>
                </a>
                <a class="nav-item" href="../profile/index.html">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span>Профиль</span>
                </a>
            </nav>
        </div>
    </div>

    <!-- Sheet overlay -->
    <div class="sheet-overlay" id="sheetOverlay"></div>

    <!-- Reject sheet -->
    <div class="bottom-sheet sheet-base bkp-reject-sheet" id="rejectSheet" role="dialog" aria-modal="true" aria-labelledby="rejectSheetTitle">
        <div class="sheet-handle-area" id="rejectHandle">
            <div class="sheet-handle"></div>
        </div>
        <div class="sheet-body no-scrollbar">
            <div class="sheet-title" id="rejectSheetTitle">Отклонить заявку</div>

            <!-- Lesson compact card -->
            <div class="bkp-lesson-compact" id="rejectLessonCompact"></div>

            <!-- Reasons -->
            <div class="bkp-reason-list" id="reasonList">
                <label class="bkp-reason-item">
                    <input type="radio" name="rejectReason" value="time">
                    <span class="bkp-reason-radio" aria-hidden="true"></span>
                    <span class="bkp-reason-label">Неподходящее время</span>
                </label>
                <label class="bkp-reason-item">
                    <input type="radio" name="rejectReason" value="level">
                    <span class="bkp-reason-radio" aria-hidden="true"></span>
                    <span class="bkp-reason-label">Ученик не подходит по уровню</span>
                </label>
                <label class="bkp-reason-item">
                    <input type="radio" name="rejectReason" value="busy">
                    <span class="bkp-reason-radio" aria-hidden="true"></span>
                    <span class="bkp-reason-label">Слишком много занятий</span>
                </label>
                <label class="bkp-reason-item">
                    <input type="radio" name="rejectReason" value="other">
                    <span class="bkp-reason-radio" aria-hidden="true"></span>
                    <span class="bkp-reason-label">Другое</span>
                </label>
            </div>

            <!-- Textarea for "other" -->
            <div class="collapsible bkp-reason-textarea-wrap" id="reasonTextareaWrap">
                <textarea class="bkp-reason-textarea input-base" id="reasonTextarea" placeholder="Опишите причину..." rows="3"></textarea>
            </div>
        </div>

        <div class="sheet-footer bkp-reject-footer">
            <button class="bkp-btn-ghost" id="btnRejectCancel">Отмена</button>
            <button class="bkp-btn-danger" id="btnRejectConfirm">Отклонить</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="bkp-toast" id="bkpToast">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="bkpToastText">Заявка одобрена</span>
    </div>

    <script src="bookings-pending.js"></script>
</body>
</html>
