<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Провести занятие — CompleteSheet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="complete.css">
</head>
<body>
    <div class="app">
        <!-- Упрощённая имитация фона календаря -->
        <div class="canvas-hint">preview — CompleteSheet поверх календаря</div>
    </div>

    <!-- Sheet overlay -->
    <div class="sheet-overlay active" id="sheetOverlay"></div>

    <!-- ═══ Complete Sheet ═══ -->
    <div class="bottom-sheet sheet-base open" id="completeSheet" role="dialog" aria-modal="true" aria-labelledby="completeSheetTitle">
        <div class="sheet-handle-area" id="completeHandle">
            <div class="sheet-handle"></div>
            <button class="sheet-close" id="btnClose" aria-label="Закрыть">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="sheet-body no-scrollbar">
            <div class="sheet-title" id="completeSheetTitle">Провести занятие</div>

            <!-- 1. LessonCard compact -->
            <div class="sheet-section">
                <div class="lesson-card">
                    <div class="avatar-variant variant-indigo" aria-hidden="true">АИ</div>
                    <div class="lesson-card-info">
                        <div class="lesson-card-name">Анна Иванова</div>
                        <div class="lesson-card-meta">
                            Математика · Сегодня, <span class="mono">14:00–15:00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Сумма к оплате -->
            <div class="sheet-section">
                <div class="section-label"><span class="dot"></span> Сумма к оплате</div>
                <div class="amount-row">
                    <div class="amount-left">
                        <div class="amount-value" id="amountValue">1 900 ₽</div>
                    </div>
                    <div class="amount-hint">по шаблону «Индивидуальное занятие»</div>
                </div>
            </div>

            <!-- 3. Статус оплаты -->
            <div class="sheet-section">
                <div class="section-label"><span class="dot"></span> Статус оплаты</div>
                <div class="format-pills" id="statusPills" role="radiogroup" aria-label="Статус оплаты">
                    <button type="button" class="format-pill" data-status="paid" role="radio" aria-checked="false">
                        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Оплачено
                    </button>
                    <button type="button" class="format-pill active variant-warning" data-status="pending" role="radio" aria-checked="true">
                        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>
                        </svg>
                        Ожидает оплаты
                    </button>
                </div>
            </div>

            <!-- 4. Метод оплаты (collapse — виден только при Оплачено) -->
            <div class="sheet-section collapse-block hidden-block" id="methodSection">
                <div class="section-label"><span class="dot"></span> Метод оплаты</div>
                <div class="method-chips" id="methodChips" role="radiogroup" aria-label="Метод оплаты">
                    <button type="button" class="method-chip" data-method="cash" role="radio" aria-checked="false">
                        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/>
                        </svg>
                        Наличные
                    </button>
                    <button type="button" class="method-chip active" data-method="transfer" role="radio" aria-checked="true">
                        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                        Перевод
                    </button>
                    <button type="button" class="method-chip" data-method="package" role="radio" aria-checked="false">
                        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                        Из пакета
                    </button>
                </div>

                <!-- Селект пакетов (виден при method=package) -->
                <div class="package-select collapse-block hidden-block" id="packageSelect">
                    <button type="button" class="package-option active" data-package="p1">
                        <div class="package-option-info">
                            <div class="package-option-name">8 занятий</div>
                            <div class="package-option-meta">осталось 3</div>
                        </div>
                        <div class="package-option-check">
                            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                    </button>
                    <button type="button" class="package-option" data-package="p2">
                        <div class="package-option-info">
                            <div class="package-option-name">4 занятия</div>
                            <div class="package-option-meta">осталось 1</div>
                        </div>
                        <div class="package-option-check">
                            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                    </button>
                </div>
            </div>

            <!-- 5. Комментарий -->
            <div class="sheet-section">
                <div class="section-label">Комментарий</div>
                <textarea class="comment-textarea input-base" id="comment" rows="4" placeholder="Заметки по уроку (для себя)…"></textarea>
            </div>
        </div>

        <!-- Footer -->
        <div class="sheet-footer">
            <button type="button" class="btn-ghost" id="btnCancel">Отменить</button>
            <button type="button" class="btn-submit" id="btnConfirm">
                Подтвердить проведение
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="toastText">Занятие проведено</span>
    </div>

    <script src="complete.js"></script>
</body>
</html>
