<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение — TutorFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <main class="auth-root">
            <div class="auth-hero">
                <div class="auth-icon auth-icon--accent" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <line x1="19" y1="8" x2="19" y2="14"/>
                        <line x1="22" y1="11" x2="16" y2="11"/>
                    </svg>
                </div>
                <h1 class="auth-title">Анна Петровна приглашает вас присоединиться</h1>
                <p class="auth-subtitle">Как ученик — вы сможете видеть расписание, получать напоминания и записываться на занятия.</p>
            </div>

            <div class="auth-tutor-card">
                <div class="auth-tutor-card__avatar avatar-variant variant-indigo">АП</div>
                <div class="auth-tutor-card__info">
                    <div class="auth-tutor-card__name">Анна Петровна</div>
                    <div class="auth-tutor-card__meta">Математика, физика</div>
                </div>
            </div>

            <div class="auth-actions">
                <a href="../calendar/index.html" class="auth-primary-btn">
                    Принять приглашение и продолжить
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </a>
                <a href="#" class="auth-secondary-btn" data-action="mock" data-mock-msg="Приглашение отклонено">Это не я</a>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
